services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: leve-investimentos-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "Leve@123456"
    ports:
      - "1433:1433"
    volumes:
      - leve-investimentos-sqlserver-data:/var/opt/mssql

volumes:
  leve-investimentos-sqlserver-data:
